## Success Criteria

- ✅ Performance requirements validated
- ✅ Bottlenecks identified with capacity estimates
- ✅ Growth projections documented
- ✅ Scaling strategies recommended
- ✅ Infrastructure improvements suggested
- ✅ Monitoring and observability assessed

## Configuration

```yaml
agent:
  name: "Scalability Assessment Agent"
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 4096

performance_metrics:
  - response_time
  - throughput
  - latency
  - memory_usage
  - cpu_usage
  - cache_hit_ratio

scaling_dimensions:
  - horizontal
  - vertical
  - database
  - cache
  - cdn

assessment_areas:
  - api_layer
  - application_layer
  - cache_layer
  - database_layer
  - message_queue
  - infrastructure

growth_scenarios:
  - conservative: 10% annual
  - moderate: 20% annual
  - aggressive: 50% annual
```

## Prompt Template

**File**: `prompts/scalability_review.md`

## Integration Points

- **Architecture Diagrams**: System design
- **Database Schema**: DDL and indexing strategy
- **Infrastructure Code**: Terraform, CloudFormation
- **Monitoring Config**: Metrics and alerts
- **Performance Benchmarks**: Load test results
