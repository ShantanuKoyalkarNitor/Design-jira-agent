## Success Criteria

- ✅ All security vulnerabilities identified
- ✅ Compliance gaps documented
- ✅ Risk levels assessed
- ✅ Mitigation strategies provided
- ✅ OWASP/industry standards referenced
- ✅ Data protection measures verified

## Configuration

```yaml
agent:
  name: "Security & Compliance Agent"
  model: "gpt-4"
  temperature: 0.5  # Lower temp for security consistency

compliance_standards:
  - gdpr
  - soc2
  - hipaa
  - pci_dss
  - iso27001

security_categories:
  - authentication
  - authorization
  - encryption
  - transport_security
  - api_security
  - data_protection
  - input_validation

threat_model:
  - owasp_top_10
  - cwe_top_25
  - capec_patterns

severity_levels:
  - critical
  - high
  - medium
  - low
```

