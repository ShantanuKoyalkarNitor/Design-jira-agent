## Success Criteria

- ✅ All explicit requirements identified and documented
- ✅ Ambiguous requirements clearly marked
- ✅ All gaps identified with impact assessment
- ✅ Clear acceptance criteria defined
- ✅ Requirements traced to design elements
- ✅ Recommendations provided for gaps

## Configuration

```yaml
agent:
  name: "Requirement Analysis Agent"
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 4096

settings:
  min_clarity_score: 75
  include_implicit_requirements: true
  cross_reference_artifacts: true
  validate_acceptance_criteria: true

categories:
  - functional
  - non-functional
  - constraint
  - assumption

severities:
  - critical
  - high
  - medium
  - low
```

## Prompt Template

**File**: `prompts/requirement_analysis.md`

## Integration Points

- **Jira**: Extract ticket and linked documents
- **Confluence**: Retrieve design documents
- **Requirements Model**: Map to upstream requirements
- **Design Documents**: Validate against architecture
