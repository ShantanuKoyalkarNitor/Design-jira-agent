# Risk Classification Skill

## Purpose
Consistently classify findings across all agents and prioritize remediation efforts.

## Classification Framework

### Severity Levels

**Critical**
- Security breach risk, data loss risk
- System unavailability risk
- Regulatory violation risk
- Must fix before production

**High**
- Significant vulnerability or design gap
- Performance or scalability risk
- Complex workaround needed
- Should fix soon

**Medium**
- Best practice deviation
- Minor functionality gap
- Performance concern
- Address in next iteration

**Low**
- Nice-to-have improvement
- Minor documentation gap
- Optimization opportunity
- Consider for future

### Impact Categories

- **Functional**: Affects feature completeness
- **Performance**: Affects response time, throughput
- **Security**: Affects confidentiality, integrity, availability
- **Scalability**: Affects system capacity
- **Maintenance**: Affects code quality, technical debt
- **Compliance**: Affects regulatory requirements

### Probability/Likelihood

- **High**: Likely to occur
- **Medium**: May occur
- **Low**: Unlikely but possible

## Risk Matrix

```
        | Low Impact | Medium Impact | High Impact
--------|-----------|---------------|----------
High    | Medium    | High          | Critical
Medium  | Low       | Medium        | High
Low     | Low       | Low           | Medium
```

## Classification Rules

### Security Findings
```
If vulnerability_type in [authentication, encryption, injection]:
  severity = critical
Else if affects_pii:
  severity = high
Else if owasp_top_10:
  severity = high
Else:
  severity = medium
```

### Architecture Findings
```
If blocks_scalability:
  severity = high
Else if violates_solid or common_pattern_misuse:
  severity = high
Else if technical_debt:
  severity = medium
Else:
  severity = low
```

### Performance Findings
```
If exceeds_capacity:
  severity = critical
Else if near_limit:
  severity = high
Else if optimization_opportunity:
  severity = medium
Else:
  severity = low
```

## Prioritization

Factors:
1. **Severity**: Critical > High > Medium > Low
2. **Impact**: How many users/components affected
3. **Effort**: Implementation complexity
4. **Blockers**: Dependencies on other fixes
5. **Risk**: Risk of introducing new issues

## Timeline Assignment

- **Immediate**: Critical severity, high impact
- **Short-term** (1-2 sprints): High severity findings
- **Medium-term** (1-2 months): Medium severity
- **Long-term**: Low severity, improvements

## Usage Example

```python
from src.risk_classifier import RiskClassifier

classifier = RiskClassifier()

# Classify a finding
finding = {
    "vulnerability": "SQL injection in login form",
    "impact_area": "security",
    "affected_users": "all",
    "fix_complexity": "medium"
}

classified = classifier.classify(finding)
# Result: severity=critical, timeline=immediate

# Create risk matrix
matrix = classifier.create_risk_matrix(findings)
```

## Consistency Rules

- Same finding type always gets same severity
- Severity independent of reporter
- Impact calculated from requirements
- Effort estimated consistently

