# Report Generation Skill

## Purpose
Transform analysis findings into comprehensive, well-formatted review reports.

## Capabilities

### 1. Report Generation
- Create markdown reports
- Generate executive summaries
- Build findings sections
- Create risk matrices
- Generate recommendations list

### 2. Formatting
- Apply consistent styling
- Create tables and lists
- Generate diagrams (Mermaid)
- Create callouts and highlights
- Format code examples

### 3. Export Formats
- Markdown (.md)
- HTML (.html)
- PDF (.pdf)
- JSON (.json)
- CSV (for metrics)

## Report Sections

Standard report includes:
1. **Title & Metadata**: Date, ticket, component, version
2. **Executive Summary**: Key findings, overall status
3. **Requirements Analysis**: Requirement status, gaps
4. **Architecture Review**: Component assessment, patterns
5. **Security Review**: Vulnerabilities, compliance status
6. **Scalability Assessment**: Capacity analysis, growth plan
7. **Risk Matrix**: Visual severity/impact mapping
8. **Recommendations**: Prioritized action items
9. **Audit Trail**: Review history, reviewed by, evidence

## Usage Example

```python
from src.report_generator import ReportGenerator

generator = ReportGenerator()

# Create report
report = generator.create_report(
    ticket_id="PROJ-123",
    findings={
        "requirements": [...],
        "architecture": [...],
        "security": [...],
        "scalability": [...]
    },
    format="markdown"
)

# Generate executive summary
summary = generator.create_summary(findings)

# Export to different formats
generator.export_as_pdf(report, "PROJ-123-review.pdf")
generator.export_as_html(report, "PROJ-123-review.html")
```

## Template System

### Markdown Template
```
# Design Review Report: {title}
## Executive Summary
- Overall Assessment
- Key Findings Count
- Critical Issues: {count}

## Findings by Category
### Requirements
### Architecture
### Security
### Scalability

## Risk Matrix
## Recommendations
## Audit Trail
```

## Risk Matrix Generation

- Creates 2D matrix (Severity x Impact)
- Color codes findings
- Groups by category
- Shows remediation timeline

## Styling Options

- **Colors**: Critical (red), High (orange), Medium (yellow), Low (green)
- **Icons**: ✓ (pass), ⚠ (warning), ✗ (fail)
- **Emphasis**: Bold for critical, italic for notes

## Configuration

```yaml
report_generation:
  include_audit_trail: true
  include_metrics: true
  include_recommendations: true
  max_recommendations: 20
  format_options:
