# Design Review Configuration - Minimal

agents:
  requirement_analysis:
    enabled: true
    model: gpt-4
    temperature: 0.7
    max_tokens: 4096
    timeout: 60

severity_thresholds:
  critical: ">= 85"
  high: "65-84"
  medium: "45-64"
  low: "0-44"

report:
  format: json
  short_term:
    days: 7-30
    sprints: 1-2
  medium_term:
    days: 30-90
    sprints: 2-4
  long_term:
    days: "90+"
    sprints: "4+"

## Approval Process
approval:
  require_human_review: true
  auto_approve_low_severity: false
  approval_roles:
    - role: "Architect"
      for_categories: ["architecture", "scalability"]
    - role: "Security Lead"
      for_categories: ["security"]
    - role: "Tech Lead"
      for_categories: ["all"]

## Integration Settings
integration:
  update_jira_ticket: true
  link_report_to_ticket: true
  create_subtasks: false
  subtask_for_critical: true
  
  git_integration:
    enabled: true
    commit_report: true
    branch: design-review/{ticket_id}
  
  notifications:
    enabled: true
    on_complete: true
    on_critical: true
    recipients: ["team@company.com"]

## Output Configuration
output:
  report_directory: "./reports"
  include_timestamp: true
  organize_by_ticket: true
  naming_convention: "{ticket_id}-design-review"
  
  # Export formats
  formats:
    markdown: true
    html: true
    pdf: false
    json: true
  
  # Archive old reports
  archive_old_reports: true
  archive_days: 90

## Logging and Audit
logging:
  level: INFO
  audit_trail: true
  log_all_findings: true
  log_agent_decisions: true
  
  file_logging:
    enabled: true
    path: "./logs"
    rotation: daily
    retention_days: 90

## Performance
performance:
  parallel_agent_execution: true
  cache_agent_responses: true
  cache_ttl: 3600
  batch_processing: true
  
  # Timeouts
  agent_timeout: 60  # seconds
  total_review_timeout: 600  # seconds

## Customization
custom_rules:
  enabled: false
  rules_file: "./config/custom_rules.yaml"
  
domain_specific_criteria:
  enabled: false
  domain: ""  # e.g., "fintech", "healthcare"

## Debug Mode
debug:
  enabled: false
  verbose_logging: false
  save_raw_responses: false
  skip_agent_execution: false
